name: TabTab E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        id: run-e2e
        continue-on-error: true
        run: pnpm test:e2e

      - name: Summarize e2e result
        if: always()
        run: |
          if [ "${{ steps.run-e2e.outcome }}" = "failure" ]; then
            echo "E2E tests failed. See the uploaded Playwright artifacts for details." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "E2E tests passed." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 30
